# Change to workflow..
name: main
on:
  push:

#Bump
env:
  CACHE_DEBUG_ENABLED: true
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: 11
    - name: run gradle
      uses: gradle/gradle-build-action@v2
      with:
        build-root-directory: gradle-project
        arguments: |
          check
          --build-cache
    - name: test notice
      run: echo "::notice file=README.md,line=1,col=5,endColumn=7::Missing semicolon"
    - name: test notice with title
      run: echo "::notice title=TITLE::Missing semicolon"
