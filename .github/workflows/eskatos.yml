name: eskatos/gradle-command-action
on:
  push:


jobs:
  run-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: 11
    - name: run gradle
      uses: eskatos/gradle-command-action@v1
      with:
        build-root-directory: gradle-project
        arguments: |
          check
          --build-cache
