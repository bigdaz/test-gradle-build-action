name: Java Toolchains
on:
  push:

env:
  CACHE_DEBUG_ENABLED: true

jobs:
  report-toolchains:
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-18.04, windows-2022, windows-2019, windows-2016, macos-11, macos-10.15]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - name: print JAVA env
      run: env | grep JAVA | sort
    - name: print ANDROID env
      run: env | grep ANDROID | sort
    - name: "Set environment variables"
      shell: bash
      run: |
        set -x
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
    - name: print ANDROID env again
      run: env | grep ANDROID | sort
    - name: print modified ANDROID env
      env:
        ANDROID_NDK_HOME: foo_$ANDROID_NDK_LATEST_HOME
        ANDROID_NDK_ROOT: bar_$ANDROID_NDK_LATEST_HOME
      run: env | grep ANDROID | sort
    - name: run gradle
      working-directory: gradle-project
      run: gradle javaToolchains
