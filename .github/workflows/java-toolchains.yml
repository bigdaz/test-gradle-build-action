name: Java Toolchains
on:
  push:

env:
  CACHE_DEBUG_ENABLED: true

jobs:
  report-toolchains:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
    - name: run gradle
      working-directory: gradle-project
      run: gradle javaToolchains
